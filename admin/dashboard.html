<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | Zoheir IT Solutions</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="admin-body">
  <div class="admin-header">
    <h1>🔧 لوحة تحكم الجريدة الذكية</h1>
    <div class="user-info">
      <span id="admin-user">المشرف</span>
      <a href="/" class="btn btn-sm btn-accent">🏠 الموقع</a>
      <button class="btn btn-sm btn-danger" onclick="logout()">🚪 خروج</button>
    </div>
  </div>
  <div class="admin-nav">
    <a href="/admin/dashboard.html" class="active">📊 لوحة القيادة</a>
    <a href="/admin/review.html">📝 مراجعة المحتوى</a>
    <a href="/admin/logs.html">📋 سجل AI</a>
    <a href="/admin/settings.html">⚙️ الإعدادات</a>
  </div>
  <div class="admin-content">
    <div id="admin-stats" class="admin-grid"></div>

    <div class="admin-card">
      <div class="admin-card-header">
        <span>📝 في انتظار المراجعة</span>
        <span id="review-count" style="background:#fef3c7;padding:2px 12px;border-radius:12px;font-size:0.8rem;">0</span>
      </div>
      <div class="admin-card-body" id="review-list">
        <div class="loading">جاري التحميل...</div>
      </div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <span>⚡ الإجراءات السريعة</span>
      </div>
      <div class="admin-card-body" style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="runCollector()">📡 جمع البيانات</button>
        <button class="btn btn-warning" onclick="runAnalysis()">🧠 تحليل</button>
        <button class="btn btn-success" onclick="runPublish()">📰 نشر تلقائي</button>
        <button class="btn btn-accent" onclick="openManualModal()">✍️ إدخال يدوي</button>
      </div>
      <div id="action-result" style="margin-top:10px;padding:0 20px 20px;"></div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <span>🕐 آخر قرارات AI</span>
      </div>
      <div class="admin-card-body" id="recent-logs">
        <div class="loading">جاري التحميل...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="manual-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>✍️ إضافة محتوى يدوي</h3>
        <button class="btn btn-sm" onclick="closeModal('manual-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="manual-form">
          <div class="form-group">
            <label>العنوان</label>
            <input type="text" class="form-control" id="m-title" required>
          </div>
          <div class="form-group">
            <label>المحتوى</label>
            <textarea class="form-control" id="m-body" required></textarea>
          </div>
          <div class="form-group">
            <label>التصنيف</label>
            <select class="form-control" id="m-category">
              <option value="news">📰 خبر</option>
              <option value="activity">📸 نشاط</option>
              <option value="announcement">📢 إعلان</option>
            </select>
          </div>
          <div class="form-group">
            <label>المصدر</label>
            <input type="text" class="form-control" id="m-source" value="إدارة الثانوية">
          </div>
          <div class="form-group">
            <label>التاريخ</label>
            <input type="date" class="form-control" id="m-date">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="submitManual()">💾 حفظ وإرسال للمعالجة</button>
        <button class="btn" onclick="closeModal('manual-modal')">إلغاء</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    function checkAuth() { if (!localStorage.getItem('admin_token')) window.location.href = '/admin'; }
    checkAuth();

    document.getElementById('admin-user').textContent = localStorage.getItem('admin_user') || 'Zoheir IT Solutions';

    function logout() { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = '/admin'; }

    async function loadDashboard() {
      try {
        const stats = await API.admin.dashboard();
        document.getElementById('admin-stats').innerHTML = `
          <div class="admin-stat"><div class="num">${stats.total_published||0}</div><div class="lbl">📰 منشور</div></div>
          <div class="admin-stat"><div class="num">${stats.total_review||0}</div><div class="lbl">⏳ للمراجعة</div></div>
          <div class="admin-stat"><div class="num">${stats.total_drafts||0}</div><div class="lbl">📝 مسودات</div></div>
          <div class="admin-stat"><div class="num">${stats.total_rejected||0}</div><div class="lbl">❌ مرفوض</div></div>
          <div class="admin-stat"><div class="num">${stats.total_ai_decisions||0}</div><div class="lbl">🤖 قرارات AI</div></div>
          <div class="admin-stat"><div class="num">${stats.total_archived||0}</div><div class="lbl">📦 مؤرشف</div></div>
        `;

        const review = await API.admin.getContent({ status: 'review' });
        document.getElementById('review-count').textContent = review.items.length;
        if (review.items.length) {
          let html = '<table class="table"><tr><th>العنوان</th><th>التصنيف</th><th>النقاط</th><th>الإجراء</th></tr>';
          review.items.forEach(item => {
            const catNames = { news: '📰 خبر', activity: '📸 نشاط', announcement: '📢 إعلان' };
            html += `<tr>
              <td>${item.title}</td>
              <td>${catNames[item.category]||item.category}</td>
              <td>${Math.round(item.overall_score*100)}%</td>
              <td style="display:flex;gap:5px;">
                <a href="/article/${item.id}" class="btn btn-sm btn-primary">عرض</a>
                <button class="btn btn-sm btn-success" onclick="approveItem(${item.id})">✓ قبول</button>
                <button class="btn btn-sm btn-danger" onclick="rejectItem(${item.id})">✗ رفض</button>
                <button class="btn btn-sm" style="background:#2563eb;color:white;" onclick="openEditModal(${item.id})">✏️ تعديل</button>
                <button class="btn btn-sm" style="background:#6b7280;color:white;" onclick="deleteItem(${item.id})">🗑 حذف</button>
              </td>
            </tr>`;
          });
          html += '</table>';
          document.getElementById('review-list').innerHTML = html;
        } else {
          document.getElementById('review-list').innerHTML = '<p style="color:#888;text-align:center;">✅ لا يوجد محتوى بانتظار المراجعة</p>';
        }

        const logs = await API.admin.getLogs({ limit: 10 });
        if (logs.items.length) {
          let html = '<table class="table"><tr><th>#</th><th>العنوان</th><th>القرار</th><th>التاريخ</th></tr>';
          logs.items.forEach(log => {
            html += `<tr><td>${log.id}</td><td>${log.title||'N/A'}</td><td><span class="status-badge ${log.decision_type}">${log.decision_type}</span></td><td>${log.created_at}</td></tr>`;
          });
          html += '</table>';
          document.getElementById('recent-logs').innerHTML = html;
        } else {
          document.getElementById('recent-logs').innerHTML = '<p style="color:#888;">لا توجد قرارات بعد</p>';
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function approveItem(id) {
      await API.admin.approve(id);
      loadDashboard();
    }

    async function rejectItem(id) {
      const reason = prompt('سبب الرفض:');
      if (reason !== null) {
        await API.admin.reject(id, reason || 'مرفوض');
        loadDashboard();
      }
    }

    async function deleteItem(id) {
      if (confirm('⚠️ هل أنت متأكد من حذف هذا المحتوى نهائيًا؟')) {
        await API.admin.removeItem(id);
        loadDashboard();
      }
    }

    let editingId = null;
    async function openEditModal(id) {
      editingId = id;
      const data = await API.admin.getContentById(id);
      document.getElementById('edit-title').value = data.title || '';
      document.getElementById('edit-body').value = (data.body || '').replace(/<br>/g, '\n');
      document.getElementById('edit-category').value = data.category || 'uncategorized';
      document.getElementById('edit-source').value = data.source_name || '';
      document.getElementById('edit-date').value = data.event_date || '';
      document.getElementById('edit-modal').classList.add('active');
    }
    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('active');
      editingId = null;
    }
    async function saveEdit() {
      if (!editingId) return;
      const data = {
        title: document.getElementById('edit-title').value,
        body: document.getElementById('edit-body').value,
        category: document.getElementById('edit-category').value,
        source_name: document.getElementById('edit-source').value,
        event_date: document.getElementById('edit-date').value,
      };
      await API.admin.updateItem(editingId, data);
      closeEditModal();
      loadDashboard();
    }

    async function runCollector() {
      document.getElementById('action-result').innerHTML = '<div class="alert alert-info">📡 جاري جمع البيانات...</div>';
      const res = await API.admin.collect();
      document.getElementById('action-result').innerHTML = `<div class="alert alert-success">✅ تم جمع ${res.collected} عنصر</div>`;
      setTimeout(() => document.getElementById('action-result').innerHTML = '', 3000);
    }

    async function runAnalysis() {
      document.getElementById('action-result').innerHTML = '<div class="alert alert-info">🧠 جاري التحليل...</div>';
      const res = await API.admin.analyze();
      document.getElementById('action-result').innerHTML = `<div class="alert alert-success">✅ تم تحليل ${res.processed} عنصر</div>`;
      setTimeout(() => document.getElementById('action-result').innerHTML = '', 3000);
    }

    async function runPublish() {
      document.getElementById('action-result').innerHTML = '<div class="alert alert-info">📰 جاري النشر التلقائي...</div>';
      const res = await API.admin.publish();
      const msg = res.results.map(r => `#${r.id}: ${r.message}`).join('<br>');
      document.getElementById('action-result').innerHTML = `<div class="alert alert-success">✅${msg}</div>`;
      loadDashboard();
    }

    function openManualModal() { document.getElementById('manual-modal').classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    async function submitManual() {
      const data = {
        title: document.getElementById('m-title').value,
        body: document.getElementById('m-body').value,
        category: document.getElementById('m-category').value,
        source: document.getElementById('m-source').value,
        event_date: document.getElementById('m-date').value,
      };
      if (!data.title || !data.body) { alert('العنوان والمحتوى مطلوبان'); return; }
      await API.admin.collectManual(data);
      closeModal('manual-modal');
      document.getElementById('action-result').innerHTML = '<div class="alert alert-success">✅ تم إرسال المحتوى للمعالجة</div>';
      setTimeout(() => { document.getElementById('action-result').innerHTML = ''; loadDashboard(); }, 1000);
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>✏️ تعديل المحتوى</h3>
      <button class="btn btn-sm" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="edit-form">
        <div class="form-group">
          <label>العنوان</label>
          <input type="text" class="form-control" id="edit-title" required>
        </div>
        <div class="form-group">
          <label>المحتوى</label>
          <textarea class="form-control" id="edit-body" required></textarea>
        </div>
        <div class="form-group">
          <label>التصنيف</label>
          <select class="form-control" id="edit-category">
            <option value="news">📰 خبر</option>
            <option value="activity">📸 نشاط</option>
            <option value="announcement">📢 إعلان</option>
          </select>
        </div>
        <div class="form-group">
          <label>المصدر</label>
          <input type="text" class="form-control" id="edit-source">
        </div>
        <div class="form-group">
          <label>التاريخ</label>
          <input type="date" class="form-control" id="edit-date">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveEdit()">💾 حفظ التعديلات</button>
      <button class="btn" onclick="closeEditModal()">إلغاء</button>
    </div>
  </div>
</div>
</body>
</html>
