<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | Zoheir IT Solutions</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body">
  <div class="admin-header">
    <h1>🔧 لوحة تحكم الصوت المحلي</h1>
    <div class="user-info">
      <span id="admin-user">المشرف</span>
      <a href="/" class="btn btn-sm btn-accent">🏠 الموقع</a>
      <button class="btn btn-sm btn-danger" onclick="logout()">🚪 خروج</button>
    </div>
  </div>
  <div class="admin-nav">
    <a href="/admin/dashboard.html" class="active">📊 لوحة القيادة</a>
    <a href="/admin/review.html">📝 مراجعة المحتوى</a>
    <a href="/admin/logs.html">📋 سجل AI</a>
    <a href="/admin/settings.html">⚙️ الإعدادات</a>
  </div>
  <div class="admin-content">
    <div id="admin-stats" class="admin-grid"></div>

    <div class="admin-card">
      <div class="admin-card-header">
        <span>📝 في انتظار المراجعة</span>
        <span id="review-count" style="background:#fef3c7;padding:2px 12px;border-radius:12px;font-size:0.8rem;">0</span>
      </div>
      <div class="admin-card-body" id="review-list">
        <div class="loading">جاري التحميل...</div>
      </div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <span>⚡ الإجراءات السريعة</span>
      </div>
      <div class="admin-card-body" style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="runCollector()">📡 جمع البيانات</button>
        <button class="btn btn-warning" onclick="runAnalysis()">🧠 تحليل</button>
        <button class="btn btn-success" onclick="runPublish()">📰 نشر تلقائي</button>
        <button class="btn btn-accent" onclick="openManualModal()">✍️ إدخال يدوي</button>
      </div>
      <div id="action-result" style="margin-top:10px;padding:0 20px 20px;"></div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <span>🕐 آخر قرارات AI</span>
      </div>
      <div class="admin-card-body" id="recent-logs">
        <div class="loading">جاري التحميل...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="manual-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>✍️ إضافة محتوى يدوي</h3>
        <button class="btn btn-sm" onclick="closeModal('manual-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="manual-form">
          <div class="form-group">
            <label>العنوان</label>
            <input type="text" class="form-control" id="m-title" required>
          </div>
          <div class="form-group">
            <label>المحتوى</label>
            <textarea class="form-control" id="m-body" required></textarea>
          </div>
          <div class="form-group">
            <label>التصنيف</label>
            <select class="form-control" id="m-category">
              <option value="news">📰 خبر</option>
              <option value="activity">📸 نشاط</option>
              <option value="announcement">📢 إعلان</option>
            </select>
          </div>
          <div class="form-group">
            <label>المصدر</label>
            <input type="text" class="form-control" id="m-source" value="مديرية ولاية تيارت">
          </div>
          <div class="form-group">
            <label>التاريخ</label>
            <input type="date" class="form-control" id="m-date">
          </div>
          <div class="form-group">
            <label>الصورة (اختياري)</label>
            <input type="file" class="form-control" id="m-image" accept="image/*" onchange="previewImage(event)">
            <div id="m-image-preview" style="margin-top:5px;max-width:200px;"></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="submitManual()">💾 حفظ وإرسال للمعالجة</button>
        <button class="btn" onclick="closeModal('manual-modal')">إلغاء</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    function checkAuth() { if (!localStorage.getItem('admin_token')) window.location.href = '/admin'; }
    checkAuth();

    document.getElementById('admin-user').textContent = localStorage.getItem('admin_user') || 'Zoheir IT Solutions';

    function logout() { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = '/admin'; }

    async function loadDashboard() {
      try {
        const stats = await API.admin.dashboard();
        document.getElementById('admin-stats').innerHTML = `
          <div class="admin-stat"><div class="num">${stats.total_published||0}</div><div class="lbl">📰 منشور</div></div>
          <div class="admin-stat"><div class="num">${stats.total_review||0}</div><div class="lbl">⏳ للمراجعة</div></div>
          <div class="admin-stat"><div class="num">${stats.total_drafts||0}</div><div class="lbl">📝 مسودات</div></div>
          <div class="admin-stat"><div class="num">${stats.total_rejected||0}</div><div class="lbl">❌ مرفوض</div></div>
          <div class="admin-stat"><div class="num">${stats.total_ai_decisions||0}</div><div class="lbl">🤖 قرارات AI</div></div>
          <div class="admin-stat"><div class="num">${stats.total_archived||0}</div><div class="lbl">📦 مؤرشف</div></div>
        `;

        const review = await API.admin.getContent({ status: 'review' });
        document.getElementById('review-count').textContent = review.items.length;
        if (review.items.length) {
          let html = '<table class="table"><tr><th>العنوان</th><th>التصنيف</th><th>النقاط</th><th>الإجراء</th></tr>';
          review.items.forEach(item => {
            const catNames = { news: '📰 خبر', activity: '📸 نشاط', announcement: '📢 إعلان' };
            html += `<tr>
              <td>${item.title}</td>
              <td>${catNames[item.category]||item.category}</td>
              <td>${Math.round(item.overall_score*100)}%</td>
              <td style="display:flex;gap:5px;">
                <a href="/article/${item.id}" class="btn btn-sm btn-primary">عرض</a>
                <button class="btn btn-sm btn-success" onclick="approveItem(${item.id})">✓ قبول</button>
                <button class="btn btn-sm btn-danger" onclick="rejectItem(${item.id})">✗ رفض</button>
                <button class="btn btn-sm" style="background:#2563eb;color:white;" onclick="openEditModal(${item.id})">✏️ تعديل</button>
                <button class="btn btn-sm" style="background:#6b7280;color:white;" onclick="deleteItem(${item.id})">🗑 حذف</button>
              </td>
            </tr>`;
          });
          html += '</table>';
          document.getElementById('review-list').innerHTML = html;
        } else {
          document.getElementById('review-list').innerHTML = '<p style="color:#888;text-align:center;">✅ لا يوجد محتوى بانتظار المراجعة</p>';
        }

        const logs = await API.admin.getLogs({ limit: 10 });
        if (logs.items.length) {
          let html = '<table class="table"><tr><th>#</th><th>العنوان</th><th>القرار</th><th>التاريخ</th></tr>';
          logs.items.forEach(log => {
            html += `<tr><td>${log.id}</td><td>${log.title||'N/A'}</td><td><span class="status-badge ${log.decision_type}">${log.decision_type}</span></td><td>${log.created_at}</td></tr>`;
          });
          html += '</table>';
          document.getElementById('recent-logs').innerHTML = html;
        } else {
          document.getElementById('recent-logs').innerHTML = '<p style="color:#888;">لا توجد قرارات بعد</p>';
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function approveItem(id) {
      try {
        const result = await API.admin.approve(id);
        if (!result.success) { document.getElementById('action-result').innerHTML = `<div class="alert alert-danger">${result.error}</div>`; return; }
        loadDashboard();
      } catch (e) { document.getElementById('action-result').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
    }

    async function rejectItem(id) {
      const reason = prompt('سبب الرفض:');
      if (reason !== null) {
        try {
          const result = await API.admin.reject(id, reason || 'مرفوض');
          if (!result.success) { document.getElementById('action-result').innerHTML = `<div class="alert alert-danger">${result.error}</div>`; return; }
          loadDashboard();
        } catch (e) { document.getElementById('action-result').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
      }
    }

    async function deleteItem(id) {
      if (confirm('⚠️ هل أنت متأكد من حذف هذا المحتوى نهائيًا؟')) {
        try {
          await API.admin.removeItem(id);
          loadDashboard();
        } catch (e) { document.getElementById('action-result').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
      }
    }

    let editingData = null;
    let editImageRemove = false;

    async function openEditModal(id) {
      editingId = id;
      editingData = await API.admin.getContentById(id);
      editImageRemove = false;
      document.getElementById('edit-title').value = editingData.title || '';
      document.getElementById('edit-body').value = (editingData.body || '').replace(/<br>/g, '\n');
      document.getElementById('edit-category').value = editingData.category || 'uncategorized';
      document.getElementById('edit-source').value = editingData.source_name || '';
      document.getElementById('edit-date').value = editingData.event_date || '';
      // Image
      const currentImg = document.getElementById('edit-current-image');
      const existingImg = editingData.image_data || editingData.image_url || '';
      if (existingImg) {
        currentImg.innerHTML = `<img src="${existingImg}" alt="الصورة الحالية" style="max-width:200px;border-radius:8px;border:1px solid #ddd;margin-bottom:4px;"><div style="font-size:0.75rem;color:#888;">الصورة الحالية</div>`;
        document.getElementById('edit-remove-image-btn').hidden = false;
      } else {
        currentImg.innerHTML = '<span style="font-size:0.8rem;color:#999;">لا توجد صورة</span>';
        document.getElementById('edit-remove-image-btn').hidden = true;
      }
      document.getElementById('edit-image-preview').innerHTML = '';
      document.getElementById('edit-image').value = '';
      // AI image button: show only for AI-generated articles
      const aiGroup = document.getElementById('edit-ai-image-group');
      aiGroup.hidden = !editingData.is_ai_generated;
      document.getElementById('edit-modal').classList.add('active');
    }
    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('active');
      editingId = null;
      editingData = null;
      editImageRemove = false;
    }

    function previewEditImage(e) {
      const file = e.target.files[0];
      const preview = document.getElementById('edit-image-preview');
      if (file) {
        const maxSize = 5 * 1024 * 1024;
        if (file.size > maxSize) { alert('⚠️ حجم الصورة كبير جداً. الحد الأقصى 5 ميغابايت'); preview.innerHTML = ''; return; }
        const reader = new FileReader();
        reader.onload = (ev) => { preview.innerHTML = `<img src="${ev.target.result}" style="max-width:200px;border-radius:8px;border:1px solid #ddd;">`; };
        reader.readAsDataURL(file);
      } else { preview.innerHTML = ''; }
    }

    function removeEditImage() {
      editImageRemove = true;
      document.getElementById('edit-current-image').innerHTML = '<span style="font-size:0.8rem;color:#999;">سيتم حذف الصورة</span>';
      document.getElementById('edit-image').value = '';
      document.getElementById('edit-image-preview').innerHTML = '';
      document.getElementById('edit-remove-image-btn').hidden = true;
    }

    async function generateAIimage() {
      if (!editingId) return;
      try {
        const btn = document.querySelector('#edit-ai-image-group .btn');
        if (btn) { btn.disabled = true; btn.textContent = '⏳ جاري التوليد...'; }
        const article = await API.admin.getContentById(editingId);
        const prompt = article.title + ' - ' + (article.summary || article.body || '').substring(0, 200);
        const res = await fetch('https://api.unsplash.com/search/photos?query=' + encodeURIComponent(prompt.substring(0, 100)) + '&per_page=1', {
          headers: { 'Authorization': 'Client-ID ' + (localStorage.getItem('unsplash_key') || '') }
        });
        let imgUrl = '';
        if (res.ok) {
          const data = await res.json();
          if (data.results && data.results.length > 0) imgUrl = data.results[0].urls.small;
        }
        if (imgUrl) {
          const preview = document.getElementById('edit-image-preview');
          preview.innerHTML = `<img src="${imgUrl}" style="max-width:200px;border-radius:8px;border:1px solid #ddd;"><div style="font-size:0.75rem;color:#888;">صورة من Unsplash</div>`;
          editingData._temp_image_url = imgUrl;
        } else {
          alert('⚠️ تعذر العثور على صورة. استخدم الرفع اليدوي بدلاً من ذلك.');
        }
        if (btn) { btn.disabled = false; btn.textContent = '✨ توليد صورة تلقائياً'; }
      } catch (e) {
        const btn = document.querySelector('#edit-ai-image-group .btn');
        if (btn) { btn.disabled = false; btn.textContent = '✨ توليد صورة تلقائياً'; }
        document.getElementById('action-result').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
      }
    }

    async function saveEdit() {
      if (!editingId) return;
      const data = {
        title: document.getElementById('edit-title').value,
        body: document.getElementById('edit-body').value,
        category: document.getElementById('edit-category').value,
        source_name: document.getElementById('edit-source').value,
        event_date: document.getElementById('edit-date').value,
      };
      // Handle image
      const fileInput = document.getElementById('edit-image');
      if (editImageRemove) {
        data.remove_image = true;
      } else if (editingData && editingData._temp_image_url) {
        data.image_url = editingData._temp_image_url;
      } else if (fileInput.files.length > 0) {
        const maxSize = 5 * 1024 * 1024;
        if (fileInput.files[0].size > maxSize) { alert('⚠️ حجم الصورة كبير جداً. الحد الأقصى 5 ميغابايت'); return; }
        try {
          data.image_data = await new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve(r.result);
            r.onerror = () => reject(new Error('فشل قراءة الملف'));
            r.readAsDataURL(fileInput.files[0]);
          });
        } catch (e) { alert('❌ ' + e.message); return; }
      }
      try {
        await API.admin.updateItem(editingId, data);
        closeEditModal();
        loadDashboard();
      } catch (e) { document.getElementById('action-result').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
    }

    async function runCollector() {
      document.getElementById('action-result').innerHTML = '<div class="alert alert-info">📡 جاري جمع البيانات...</div>';
      const res = await API.admin.collect();
      document.getElementById('action-result').innerHTML = `<div class="alert alert-success">✅ تم جمع ${res.collected} عنصر</div>`;
      setTimeout(() => document.getElementById('action-result').innerHTML = '', 3000);
    }

    async function runAnalysis() {
      document.getElementById('action-result').innerHTML = '<div class="alert alert-info">🧠 جاري التحليل...</div>';
      const res = await API.admin.analyze();
      document.getElementById('action-result').innerHTML = `<div class="alert alert-success">✅ تم تحليل ${res.processed} عنصر</div>`;
      setTimeout(() => document.getElementById('action-result').innerHTML = '', 3000);
    }

    async function runPublish() {
      document.getElementById('action-result').innerHTML = '<div class="alert alert-info">📰 جاري النشر التلقائي...</div>';
      const res = await API.admin.publish();
      const msg = res.results.map(r => `#${r.id}: ${r.message}`).join('<br>');
      document.getElementById('action-result').innerHTML = `<div class="alert alert-success">✅${msg}</div>`;
      loadDashboard();
    }

    function previewImage(e) {
      clearModalError();
      const file = e.target.files[0];
      const preview = document.getElementById('m-image-preview');
      if (file) {
        const maxSize = 5 * 1024 * 1024;
        if (file.size > maxSize) { showModalError('حجم الصورة كبير جداً. الحد الأقصى 5 ميغابايت'); preview.innerHTML = ''; return; }
        const reader = new FileReader();
        reader.onload = (ev) => { preview.innerHTML = `<img src="${ev.target.result}" style="max-width:200px;border-radius:8px;border:1px solid #ddd;">`; };
        reader.onerror = () => { showModalError('فشل قراءة الصورة للمعاينة'); };
        reader.readAsDataURL(file);
      } else { preview.innerHTML = ''; }
    }

    function openManualModal() { resetManualForm(); document.getElementById('manual-modal').classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function resetManualForm() {
      document.getElementById('manual-form').reset();
      document.getElementById('m-image-preview').innerHTML = '';
      clearModalError();
    }

    function showModalError(msg) {
      const errDiv = document.getElementById('m-error') || (() => {
        const d = document.createElement('div');
        d.id = 'm-error';
        d.style.cssText = 'margin-top:10px;padding:10px;border-radius:8px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;font-size:0.9rem;';
        document.querySelector('#manual-modal .modal-body').appendChild(d);
        return d;
      })();
      errDiv.innerHTML = '⚠️ ' + msg;
    }
    function clearModalError() {
      const errDiv = document.getElementById('m-error');
      if (errDiv) errDiv.innerHTML = '';
    }
    async function submitManual() {
      clearModalError();
      const data = {
        title: document.getElementById('m-title').value,
        body: document.getElementById('m-body').value,
        category: document.getElementById('m-category').value,
        source: document.getElementById('m-source').value,
        event_date: document.getElementById('m-date').value,
      };
      if (!data.title || !data.body) { showModalError('العنوان والمحتوى مطلوبان'); return; }
      const fileInput = document.getElementById('m-image');
      if (fileInput.files.length > 0) {
        const maxSize = 5 * 1024 * 1024;
        if (fileInput.files[0].size > maxSize) { showModalError('حجم الصورة كبير جداً. الحد الأقصى 5 ميغابايت'); return; }
        try {
          data.image_data = await new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve(r.result);
            r.onerror = () => reject(new Error('فشل قراءة الملف'));
            r.readAsDataURL(fileInput.files[0]);
          });
        } catch (e) {
          showModalError(e.message || 'فشل قراءة الصورة');
          return;
        }
      }
      const btn = document.querySelector('#manual-modal .btn-primary');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...'; }
      try {
        await API.admin.collectManual(data);
        closeModal('manual-modal');
        resetManualForm();
        document.getElementById('action-result').innerHTML = '<div class="alert alert-success">✅ تم إرسال المحتوى للمعالجة</div>';
        setTimeout(() => { document.getElementById('action-result').innerHTML = ''; loadDashboard(); }, 1000);
      } catch (e) {
        if (btn) { btn.disabled = false; btn.textContent = '💾 حفظ وإرسال للمعالجة'; }
        showModalError(e.message || 'فشل الاتصال بالخادم');
      }
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>✏️ تعديل المحتوى</h3>
      <button class="btn btn-sm" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="edit-form">
        <div class="form-group">
          <label>العنوان</label>
          <input type="text" class="form-control" id="edit-title" required>
        </div>
        <div class="form-group">
          <label>المحتوى</label>
          <textarea class="form-control" id="edit-body" required></textarea>
        </div>
        <div class="form-group">
          <label>التصنيف</label>
          <select class="form-control" id="edit-category">
            <option value="news">📰 خبر</option>
            <option value="activity">📸 نشاط</option>
            <option value="announcement">📢 إعلان</option>
          </select>
        </div>
        <div class="form-group">
          <label>المصدر</label>
          <input type="text" class="form-control" id="edit-source">
        </div>
        <div class="form-group">
          <label>التاريخ</label>
          <input type="date" class="form-control" id="edit-date">
        </div>
        <div class="form-group">
          <label>الصورة</label>
          <div id="edit-current-image" style="margin-bottom:8px;"></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <input type="file" class="form-control" id="edit-image" accept="image/*" onchange="previewEditImage(event)" style="flex:1;min-width:160px;">
            <button type="button" class="btn btn-sm" style="background:#dc2626;color:white;" onclick="removeEditImage()" id="edit-remove-image-btn" hidden>🗑 حذف الصورة</button>
          </div>
          <div id="edit-image-preview" style="margin-top:5px;max-width:200px;"></div>
        </div>
        <div class="form-group" id="edit-ai-image-group" hidden>
          <button type="button" class="btn btn-accent" onclick="generateAIimage()">✨ توليد صورة تلقائياً</button>
          <span style="font-size:0.8rem;color:#888;margin-right:8px;">(للمقالات المنشأة بالذكاء الاصطناعي)</span>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveEdit()">💾 حفظ التعديلات</button>
      <button class="btn" onclick="closeEditModal()">إلغاء</button>
    </div>
  </div>
</div>
</body>
</html>
