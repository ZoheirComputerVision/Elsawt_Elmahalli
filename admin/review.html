<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مراجعة المحتوى | لوحة التحكم</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body">
  <div class="admin-header">
    <h1>🔧 لوحة تحكم الصوت المحلي</h1>
    <div class="user-info">
      <span id="admin-user">المشرف</span>
      <a href="/" class="btn btn-sm btn-accent">🏠 الموقع</a>
      <button class="btn btn-sm btn-danger" onclick="logout()">🚪 خروج</button>
    </div>
  </div>
  <div class="admin-nav">
    <a href="/admin/dashboard.html">📊 لوحة القيادة</a>
    <a href="/admin/review.html" class="active">📝 مراجعة المحتوى</a>
    <a href="/admin/logs.html">📋 سجل AI</a>
    <a href="/admin/settings.html">⚙️ الإعدادات</a>
  </div>
  <div class="admin-content">
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <button class="btn btn-sm btn-primary" onclick="loadContent('all')">📋 الكل</button>
      <button class="btn btn-sm btn-warning" onclick="loadContent('review')">⏳ للمراجعة</button>
      <button class="btn btn-sm" onclick="loadContent('draft')">📝 مسودات</button>
      <button class="btn btn-sm btn-success" onclick="loadContent('published')">✅ منشور</button>
      <button class="btn btn-sm btn-danger" onclick="loadContent('rejected')">❌ مرفوض</button>
    </div>
    <div class="admin-card">
      <div class="admin-card-header">
        <span>📝 المحتوى</span>
        <span id="content-count" style="background:#e5e7eb;padding:2px 12px;border-radius:12px;font-size:0.8rem;">0</span>
      </div>
      <div class="admin-card-body" id="content-list">
        <div class="loading">جاري التحميل...</div>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script>
    function checkAuth() { if (!localStorage.getItem('admin_token')) window.location.href = '/admin'; }
    checkAuth();
    document.getElementById('admin-user').textContent = localStorage.getItem('admin_user') || 'Zoheir IT Solutions';
    function logout() { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = '/admin'; }

    let sortState = { field: '', dir: 1 };
    function sortDir(field) { return sortState.field === field ? (sortState.dir > 0 ? '▲' : '▼') : ''; }
    function sortByField(field) {
      if (sortState.field === field) sortState.dir *= -1;
      else { sortState.field = field; sortState.dir = 1; }
      renderContent();
    }
    function sortByCategory() { sortByField('category'); }
    function sortByDate() { sortByField('date'); }

    let cachedData = null;
    let currentStatus = 'all';

    async function loadContent(status = 'all') {
      currentStatus = status;
      const container = document.getElementById('content-list');
      container.innerHTML = '<div class="loading">📡 جاري التحميل... <span style="font-size:0.8rem;color:#888;">(قد يستغرق 30-60 ثانية في أول مرة)</span></div>';
      // مهلة أمان 45 ثانية
      const timeoutId = setTimeout(() => {
        container.innerHTML = '<div class="alert alert-danger">⚠️ استغرق الطلب وقتاً طويلاً. <button class="btn btn-sm" onclick="loadContent(\'' + status + '\')">🔄 إعادة المحاولة</button></div>';
      }, 45000);
      try {
        const params = status !== 'all' ? { status } : {};
        const data = await API.admin.getContent(params);
        clearTimeout(timeoutId);
        cachedData = data.items;
        document.getElementById('content-count').textContent = data.items.length;
        renderContent();
      } catch (e) {
        clearTimeout(timeoutId);
        container.innerHTML = `<div class="alert alert-danger">⚠️ ${e.message} <button class="btn btn-sm" onclick="loadContent('${status}')">🔄 إعادة المحاولة</button></div>`;
      }
    }

    function renderContent() {
      const container = document.getElementById('content-list');
      let items = [...(cachedData || [])];

      if (!items.length) {
        container.innerHTML = '<p style="color:#888;text-align:center;padding:30px;">لا توجد محتويات</p>';
        return;
      }

      if (sortState.field === 'category') {
        items.sort((a, b) => {
          const ca = a.category || ''; const cb = b.category || '';
          return sortState.dir * ca.localeCompare(cb);
        });
      } else if (sortState.field === 'date') {
        items.sort((a, b) => {
          const da = a.event_date || a.created_at || '';
          const db = b.event_date || b.created_at || '';
          return sortState.dir * da.localeCompare(db);
        });
      }

      const catNames = {
        'الوطن': '🇩🇿 الوطن', 'اقتصاد': '💰 اقتصاد', 'رياضة': '⚽ رياضة',
        'العالم': '🌍 العالم', 'مجتمع': '👥 مجتمع', 'اسلاميات': '🕌 اسلاميات',
        'تكنولوجيا': '💻 تكنولوجيا',
        news: '📰 خبر', activity: '📸 نشاط', announcement: '📢 إعلان', uncategorized: '❓ غير مصنف',
      };
      const stNames = { published: '✅ منشور', draft: '📝 مسودة', review: '⏳ مراجعة', rejected: '❌ مرفوض' };

        let html = `<table class="table">
          <tr><th>#</th><th>العنوان</th><th onclick="sortByCategory()" style="cursor:pointer">التصنيف ${sortDir('category')}</th><th>الحالة</th><th>الثقة</th><th onclick="sortByDate()" style="cursor:pointer">التاريخ ${sortDir('date')}</th><th>الإجراءات</th></tr>`;

        items.forEach(item => {
          html += `<tr>
            <td>${item.id}</td>
            <td>${item.title.substring(0,40)}${item.title.length>40?'...':''}</td>
            <td>${catNames[item.category]||item.category}</td>
            <td><span class="status-badge ${item.status}">${stNames[item.status]||item.status}</span></td>
            <td>${Math.round(item.overall_score*100)}%</td>
            <td>${(item.event_date||item.created_at||'').substring(0,10)}</td>
            <td style="display:flex;gap:4px;flex-wrap:wrap;">
              <a href="/article/${item.id}" class="btn btn-sm btn-primary">عرض</a>
              ${item.status !== 'published' ? `<button class="btn btn-sm btn-success" onclick="approveItem(${item.id})">✓ قبول</button>` : ''}
              ${item.status !== 'rejected' ? `<button class="btn btn-sm btn-danger" onclick="rejectItem(${item.id})">✗ رفض</button>` : ''}
              ${item.status === 'draft' ? `<button class="btn btn-sm btn-accent" onclick="generateItem(${item.id})">🖋 توليد</button>` : ''}
              <button class="btn btn-sm" style="background:#2563eb;color:white;" onclick="openEditModal(${item.id})">✏️ تعديل</button>
              <button class="btn btn-sm" style="background:#6b7280;color:white;" onclick="deleteItem(${item.id})">🗑 حذف</button>
            </td>
          </tr>`;
        });
        html += '</table>';
        container.innerHTML = html;
    }

    async function approveItem(id) {
      try {
        const result = await API.admin.approve(id);
        if (!result.success) { alert('❌ ' + result.error); return; }
        loadContent();
      } catch (e) { alert('❌ ' + e.message); }
    }
    async function rejectItem(id) {
      const reason = prompt('سبب الرفض:');
      if (reason !== null) {
        try {
          const result = await API.admin.reject(id, reason || 'مرفوض');
          if (!result.success) { alert('❌ ' + result.error); return; }
          loadContent();
        } catch (e) { alert('❌ ' + e.message); }
      }
    }
    async function generateItem(id) {
      try {
        await API.admin.generate(id);
        loadContent();
      } catch (e) { alert('❌ ' + e.message); }
    }
    async function deleteItem(id) {
      if (confirm('⚠️ هل أنت متأكد من حذف هذا المحتوى نهائيًا؟')) {
        try {
          await API.admin.removeItem(id);
          loadContent();
        } catch (e) { alert('❌ ' + e.message); }
      }
    }

    let editingId = null;
    let editingData = null;
    let editImageRemove = false;

    async function openEditModal(id) {
      editingId = id;
      editingData = await API.admin.getContentById(id);
      editImageRemove = false;
      document.getElementById('edit-title').value = editingData.title || '';
      document.getElementById('edit-body').value = (editingData.body || '').replace(/<br>/g, '\n');
      document.getElementById('edit-category').value = editingData.category || 'uncategorized';
      document.getElementById('edit-source').value = editingData.source_name || '';
      document.getElementById('edit-date').value = editingData.event_date || '';
      // Image
      const currentImg = document.getElementById('edit-current-image');
      const existingImg = editingData.image_data || editingData.image_url || '';
      if (existingImg) {
        currentImg.innerHTML = `<img src="${existingImg}" alt="الصورة الحالية" style="max-width:200px;border-radius:8px;border:1px solid #ddd;margin-bottom:4px;"><div style="font-size:0.75rem;color:#888;">الصورة الحالية</div>`;
        document.getElementById('edit-remove-image-btn').hidden = false;
      } else {
        currentImg.innerHTML = '<span style="font-size:0.8rem;color:#999;">لا توجد صورة</span>';
        document.getElementById('edit-remove-image-btn').hidden = true;
      }
      document.getElementById('edit-image-preview').innerHTML = '';
      document.getElementById('edit-image').value = '';
      // AI image button: show only for AI-generated articles
      const aiGroup = document.getElementById('edit-ai-image-group');
      if (editingData.is_ai_generated) {
        aiGroup.hidden = false;
      } else {
        aiGroup.hidden = true;
      }
      document.getElementById('edit-modal').classList.add('active');
    }
    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('active');
      editingId = null;
      editingData = null;
      editImageRemove = false;
    }

    function previewEditImage(e) {
      const file = e.target.files[0];
      const preview = document.getElementById('edit-image-preview');
      if (file) {
        const maxSize = 5 * 1024 * 1024;
        if (file.size > maxSize) { alert('⚠️ حجم الصورة كبير جداً. الحد الأقصى 5 ميغابايت'); preview.innerHTML = ''; return; }
        const reader = new FileReader();
        reader.onload = (ev) => { preview.innerHTML = `<img src="${ev.target.result}" style="max-width:200px;border-radius:8px;border:1px solid #ddd;">`; };
        reader.readAsDataURL(file);
      } else { preview.innerHTML = ''; }
    }

    function removeEditImage() {
      editImageRemove = true;
      document.getElementById('edit-current-image').innerHTML = '<span style="font-size:0.8rem;color:#999;">سيتم حذف الصورة</span>';
      document.getElementById('edit-image').value = '';
      document.getElementById('edit-image-preview').innerHTML = '';
      document.getElementById('edit-remove-image-btn').hidden = true;
    }

    async function generateAIimage() {
      if (!editingId) return;
      try {
        const btn = document.querySelector('#edit-ai-image-group .btn');
        if (btn) { btn.disabled = true; btn.textContent = '⏳ جاري التوليد...'; }
        const article = await API.admin.getContentById(editingId);
        const prompt = article.title + ' - ' + (article.summary || article.body || '').substring(0, 200);
        const res = await fetch('https://api.unsplash.com/search/photos?query=' + encodeURIComponent(prompt.substring(0, 100)) + '&per_page=1', {
          headers: { 'Authorization': 'Client-ID ' + (localStorage.getItem('unsplash_key') || '') }
        });
        let imgUrl = '';
        if (res.ok) {
          const data = await res.json();
          if (data.results && data.results.length > 0) imgUrl = data.results[0].urls.small;
        }
        if (imgUrl) {
          const preview = document.getElementById('edit-image-preview');
          preview.innerHTML = `<img src="${imgUrl}" style="max-width:200px;border-radius:8px;border:1px solid #ddd;"><div style="font-size:0.75rem;color:#888;">صورة من Unsplash</div>`;
          // Store URL for saving
          editingData._temp_image_url = imgUrl;
        } else {
          alert('⚠️ تعذر العثور على صورة. استخدم الرفع اليدوي بدلاً من ذلك.');
        }
        if (btn) { btn.disabled = false; btn.textContent = '✨ توليد صورة تلقائياً'; }
      } catch (e) {
        const btn = document.querySelector('#edit-ai-image-group .btn');
        if (btn) { btn.disabled = false; btn.textContent = '✨ توليد صورة تلقائياً'; }
        alert('❌ ' + e.message);
      }
    }

    async function saveEdit() {
      if (!editingId) return;
      const data = {
        title: document.getElementById('edit-title').value,
        body: document.getElementById('edit-body').value,
        category: document.getElementById('edit-category').value,
        source_name: document.getElementById('edit-source').value,
        event_date: document.getElementById('edit-date').value,
      };
      // Handle image
      const fileInput = document.getElementById('edit-image');
      if (editImageRemove) {
        data.remove_image = true;
      } else if (editingData && editingData._temp_image_url) {
        data.image_url = editingData._temp_image_url;
      } else if (fileInput.files.length > 0) {
        const maxSize = 5 * 1024 * 1024;
        if (fileInput.files[0].size > maxSize) { alert('⚠️ حجم الصورة كبير جداً. الحد الأقصى 5 ميغابايت'); return; }
        try {
          data.image_data = await new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve(r.result);
            r.onerror = () => reject(new Error('فشل قراءة الملف'));
            r.readAsDataURL(fileInput.files[0]);
          });
        } catch (e) { alert('❌ ' + e.message); return; }
      }
      try {
        await API.admin.updateItem(editingId, data);
        closeEditModal();
        loadContent();
      } catch (e) { alert('❌ ' + e.message); }
    }
    document.addEventListener('DOMContentLoaded', () => loadContent('all'));
  </script>
</head>
<body>
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>✏️ تعديل المحتوى</h3>
      <button class="btn btn-sm" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="edit-form">
        <div class="form-group">
          <label>العنوان</label>
          <input type="text" class="form-control" id="edit-title" required>
        </div>
        <div class="form-group">
          <label>المحتوى</label>
          <textarea class="form-control" id="edit-body" required></textarea>
        </div>
        <div class="form-group">
          <label>التصنيف</label>
          <select class="form-control" id="edit-category">
            <option value="الوطن">🇩🇿 الوطن</option>
            <option value="اقتصاد">💰 اقتصاد</option>
            <option value="رياضة">⚽ رياضة</option>
            <option value="العالم">🌍 العالم</option>
            <option value="مجتمع">👥 مجتمع</option>
            <option value="اسلاميات">🕌 اسلاميات</option>
            <option value="تكنولوجيا">💻 تكنولوجيا</option>
          </select>
        </div>
        <div class="form-group">
          <label>المصدر</label>
          <input type="text" class="form-control" id="edit-source">
        </div>
        <div class="form-group">
          <label>التاريخ</label>
          <input type="date" class="form-control" id="edit-date">
        </div>
        <div class="form-group">
          <label>الصورة</label>
          <div id="edit-current-image" style="margin-bottom:8px;"></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <input type="file" class="form-control" id="edit-image" accept="image/*" onchange="previewEditImage(event)" style="flex:1;min-width:160px;">
            <button type="button" class="btn btn-sm" style="background:#dc2626;color:white;" onclick="removeEditImage()" id="edit-remove-image-btn" hidden>🗑 حذف الصورة</button>
          </div>
          <div id="edit-image-preview" style="margin-top:5px;max-width:200px;"></div>
        </div>
        <div class="form-group" id="edit-ai-image-group" hidden>
          <button type="button" class="btn btn-accent" onclick="generateAIimage()">✨ توليد صورة تلقائياً</button>
          <span style="font-size:0.8rem;color:#888;margin-right:8px;">(للمقالات المنشأة بالذكاء الاصطناعي)</span>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveEdit()">💾 حفظ التعديلات</button>
      <button class="btn" onclick="closeEditModal()">إلغاء</button>
    </div>
  </div>
</div>
</body>
</html>
