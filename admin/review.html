<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مراجعة المحتوى | لوحة التحكم</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body">
  <div class="admin-header">
    <h1>🔧 لوحة تحكم الصوت المحلي</h1>
    <div class="user-info">
      <span id="admin-user">المشرف</span>
      <a href="/" class="btn btn-sm btn-accent">🏠 الموقع</a>
      <button class="btn btn-sm btn-danger" onclick="logout()">🚪 خروج</button>
    </div>
  </div>
  <div class="admin-nav">
    <a href="/admin/dashboard.html">📊 لوحة القيادة</a>
    <a href="/admin/review.html" class="active">📝 مراجعة المحتوى</a>
    <a href="/admin/media.html">🖼 مكتبة الوسائط</a>
    <a href="/admin/featured.html">⭐ الخبر الرئيسي</a>
    <a href="/admin/breaking.html">📢 الأخبار العاجلة</a>
    <a href="/admin/users.html">👥 المستخدمون</a>
    <a href="/admin/logs.html">📋 سجل AI</a>
    <a href="/admin/settings.html">⚙️ الإعدادات</a>
  </div>
  <div class="admin-content">
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <button class="btn btn-sm btn-primary" onclick="loadContent('all')">📋 الكل</button>
      <button class="btn btn-sm btn-warning" onclick="loadContent('review')">⏳ للمراجعة</button>
      <button class="btn btn-sm" onclick="loadContent('draft')">📝 مسودات</button>
      <button class="btn btn-sm btn-success" onclick="loadContent('published')">✅ منشور</button>
      <button class="btn btn-sm btn-danger" onclick="loadContent('rejected')">❌ مرفوض</button>
      <span style="width:2px;background:#ddd;margin:0 5px;"></span>
      <button class="btn btn-sm" style="background:#10b981;color:white;" onclick="loadVisibility('active')">🟢 نشط</button>
      <button class="btn btn-sm" style="background:#f59e0b;color:white;" onclick="loadVisibility('expired')">🟡 منتهي</button>
      <button class="btn btn-sm" style="background:#6b7280;color:white;" onclick="loadVisibility('archived')">⚪ مؤرشف</button>
    </div>
    <div class="admin-card">
      <div class="admin-card-header">
        <span>📝 المحتوى</span>
        <span id="content-count" style="background:#e5e7eb;padding:2px 12px;border-radius:12px;font-size:0.8rem;">0</span>
      </div>
      <div class="admin-card-body" id="content-list">
        <div class="loading">جاري التحميل...</div>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script>
    function checkAuth() { if (!localStorage.getItem('admin_token')) window.location.href = '/admin'; }
    checkAuth();
    document.getElementById('admin-user').textContent = localStorage.getItem('admin_user') || 'Zoheir IT Solutions';
    function logout() { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = '/admin'; }

    let sortState = { field: '', dir: 1 };
    function sortDir(field) { return sortState.field === field ? (sortState.dir > 0 ? '▲' : '▼') : ''; }
    function sortByField(field) {
      if (sortState.field === field) sortState.dir *= -1;
      else { sortState.field = field; sortState.dir = 1; }
      renderContent();
    }
    function sortByCategory() { sortByField('category'); }
    function sortByDate() { sortByField('date'); }

    let cachedData = null;
    let currentStatus = 'all';
    let currentVisibility = null;

    async function loadVisibility(vStatus) {
      currentVisibility = vStatus;
      const container = document.getElementById('content-list');
      container.innerHTML = '<div class="loading">📡 جاري التحميل...</div>';
      try {
        const data = await API.admin.getContent({ visibility_status: vStatus });
        cachedData = data.items;
        document.getElementById('content-count').textContent = data.items.length;
        renderContent();
      } catch (e) {
        container.innerHTML = `<div class="alert alert-danger">⚠️ ${e.message}</div>`;
      }
    }

    async function loadContent(status = 'all') {
      currentStatus = status;
      currentVisibility = null;
      const container = document.getElementById('content-list');
      container.innerHTML = '<div class="loading">📡 جاري التحميل... <span style="font-size:0.8rem;color:#888;">(قد يستغرق 30-60 ثانية في أول مرة)</span></div>';
      // مهلة أمان 45 ثانية
      const timeoutId = setTimeout(() => {
        container.innerHTML = '<div class="alert alert-danger">⚠️ استغرق الطلب وقتاً طويلاً. <button class="btn btn-sm" onclick="loadContent(\'' + status + '\')">🔄 إعادة المحاولة</button></div>';
      }, 45000);
      try {
        const params = status !== 'all' ? { status } : {};
        const data = await API.admin.getContent(params);
        clearTimeout(timeoutId);
        cachedData = data.items;
        document.getElementById('content-count').textContent = data.items.length;
        renderContent();
      } catch (e) {
        clearTimeout(timeoutId);
        container.innerHTML = `<div class="alert alert-danger">⚠️ ${e.message} <button class="btn btn-sm" onclick="loadContent('${status}')">🔄 إعادة المحاولة</button></div>`;
      }
    }

    function renderContent() {
      const container = document.getElementById('content-list');
      let items = [...(cachedData || [])];

      if (!items.length) {
        container.innerHTML = '<p style="color:#888;text-align:center;padding:30px;">لا توجد محتويات</p>';
        return;
      }

      if (sortState.field === 'category') {
        items.sort((a, b) => {
          const ca = a.category || ''; const cb = b.category || '';
          return sortState.dir * ca.localeCompare(cb);
        });
      } else if (sortState.field === 'date') {
        items.sort((a, b) => {
          const da = a.event_date || a.created_at || '';
          const db = b.event_date || b.created_at || '';
          return sortState.dir * da.localeCompare(db);
        });
      }

      const catNames = {
        'الوطن': '🇩🇿 الوطن', 'اقتصاد': '💰 اقتصاد', 'رياضة': '⚽ رياضة',
        'العالم': '🌍 العالم', 'مجتمع': '👥 مجتمع', 'اسلاميات': '🕌 اسلاميات',
        'تكنولوجيا': '💻 تكنولوجيا',
        news: '📰 خبر', activity: '📸 نشاط', announcement: '📢 إعلان', uncategorized: '❓ غير مصنف',
      };
      const stNames = { published: '✅ منشور', draft: '📝 مسودة', review: '⏳ مراجعة', rejected: '❌ مرفوض' };
      const visNames = { active: '🟢 نشط', expired: '🟡 منتهي', archived: '⚪ مؤرشف' };

        let html = `<table class="table">
          <tr><th>#</th><th>العنوان</th><th onclick="sortByCategory()" style="cursor:pointer">التصنيف ${sortDir('category')}</th><th>الحالة</th><th>الظهور</th><th>الثقة</th><th onclick="sortByDate()" style="cursor:pointer">التاريخ ${sortDir('date')}</th><th>الإجراءات</th></tr>`;

        items.forEach(item => {
          const isExpired = item.visibility_status === 'expired';
          const isArchived = item.visibility_status === 'archived';
          const rowStyle = isExpired ? 'style="opacity:0.6;"' : isArchived ? 'style="opacity:0.4;"' : '';
          html += `<tr ${rowStyle}>
            <td>${item.id}</td>
            <td>${item.title.substring(0,40)}${item.title.length>40?'...':''}</td>
            <td>${catNames[item.category]||item.category}</td>
            <td><span class="status-badge ${item.status}">${stNames[item.status]||item.status}</span></td>
            <td><span class="status-badge ${item.visibility_status||'active'}">${visNames[item.visibility_status]||'🟢 نشط'}</span></td>
            <td>${Math.round(item.overall_score*100)}%</td>
            <td>${(item.event_date||item.created_at||'').substring(0,10)}</td>
            <td style="display:flex;gap:4px;flex-wrap:wrap;">
              <a href="/article/${item.id}${isExpired||isArchived?'?source=archive':''}" class="btn btn-sm btn-primary">عرض</a>
              ${item.status !== 'published' ? `<button class="btn btn-sm btn-success" onclick="approveItem(${item.id})">✓ قبول</button>` : ''}
              ${item.status !== 'rejected' ? `<button class="btn btn-sm btn-danger" onclick="rejectItem(${item.id})">✗ رفض</button>` : ''}
              ${item.status === 'draft' ? `<button class="btn btn-sm btn-accent" onclick="generateItem(${item.id})">🖋 توليد</button>` : ''}
              ${!isArchived && item.status === 'published'
                ? `<button class="btn btn-sm" style="background:#6b7280;color:white;" onclick="archiveItem(${item.id})">📦 أرشفة</button>`
                : ''}
              ${isArchived
                ? `<button class="btn btn-sm" style="background:#10b981;color:white;" onclick="restoreItem(${item.id})">📂 استعادة</button>`
                : ''}
              ${isExpired || isArchived
                ? `<button class="btn btn-sm" style="background:#10b981;color:white;" onclick="reactivateItem(${item.id})">🔄 إعادة تنشيط</button>`
                : item.status === 'published' ? `<button class="btn btn-sm" style="background:#f59e0b;color:white;" onclick="expireItem(${item.id})">⏳ إنهاء صلاحية</button>` : ''}
              <button class="btn btn-sm" style="background:#2563eb;color:white;" onclick="openEditModal(${item.id})">✏️ تعديل</button>
              <button class="btn btn-sm" style="background:#6b7280;color:white;" onclick="deleteItem(${item.id})">🗑 حذف</button>
            </td>
          </tr>`;
        });
        html += '</table>';
        container.innerHTML = html;
    }

    async function approveItem(id) {
      try {
        const result = await API.admin.approve(id);
        if (!result.success) { alert('❌ ' + result.error); return; }
        loadContent();
      } catch (e) { alert('❌ ' + e.message); }
    }
    async function rejectItem(id) {
      const reason = prompt('سبب الرفض:');
      if (reason !== null) {
        try {
          const result = await API.admin.reject(id, reason || 'مرفوض');
          if (!result.success) { alert('❌ ' + result.error); return; }
          loadContent();
        } catch (e) { alert('❌ ' + e.message); }
      }
    }
    async function generateItem(id) {
      try {
        await API.admin.generate(id);
        loadContent();
      } catch (e) { alert('❌ ' + e.message); }
    }
    async function reactivateItem(id) {
      try {
        await API.admin.reactivate(id);
        loadContent();
      } catch (e) { alert('❌ ' + e.message); }
    }
    async function expireItem(id) {
      if (confirm('⚠️ هل أنت متأكد من إنهاء صلاحية هذا المحتوى؟')) {
        try {
          await API.admin.expire(id);
          loadContent();
        } catch (e) { alert('❌ ' + e.message); }
      }
    }

    async function archiveItem(id) {
      if (confirm('📦 هل أنت متأكد من أرشفة هذا المحتوى؟')) {
        try {
          await API.admin.archiveContent(id);
          loadContent();
        } catch (e) { alert('❌ ' + e.message); }
      }
    }

    async function restoreItem(id) {
      if (confirm('📂 هل تريد استعادة هذا المحتوى من الأرشيف؟')) {
        try {
          await API.admin.restoreContent(id);
          loadContent();
        } catch (e) { alert('❌ ' + e.message); }
      }
    }

    async function deleteItem(id) {
      if (confirm('⚠️ هل أنت متأكد من حذف هذا المحتوى نهائيًا؟')) {
        try {
          await API.admin.removeItem(id);
          loadContent();
        } catch (e) { alert('❌ ' + e.message); }
      }
    }

    let editingId = null;
    async function openEditModal(id) {
      editingId = id;
      const data = await API.admin.getContentById(id);
      document.getElementById('edit-title').value = data.title || '';
      document.getElementById('edit-body').value = (data.body || '').replace(/<br>/g, '\n');
      document.getElementById('edit-category').value = data.category || 'uncategorized';
      document.getElementById('edit-source').value = data.source_name || '';
      document.getElementById('edit-date').value = data.event_date || '';
      // Expiration fields
      if (data.expires_at) {
        document.getElementById('edit-no-expire').checked = false;
        document.getElementById('edit-expire-fields').style.display = 'block';
        const d = new Date(data.expires_at);
        document.getElementById('edit-expire-date').value = d.toISOString().split('T')[0];
        document.getElementById('edit-expire-time').value = d.toTimeString().slice(0, 5);
      } else {
        document.getElementById('edit-no-expire').checked = true;
        document.getElementById('edit-expire-fields').style.display = 'none';
      }
      document.getElementById('edit-modal').classList.add('active');
    }
    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('active');
      editingId = null;
    }
    async function saveEdit() {
      if (!editingId) return;
      const data = {
        title: document.getElementById('edit-title').value,
        body: document.getElementById('edit-body').value,
        category: document.getElementById('edit-category').value,
        source_name: document.getElementById('edit-source').value,
        event_date: document.getElementById('edit-date').value,
        expires_at: getExpiresAt('edit'),
      };
      try {
        await API.admin.updateItem(editingId, data);
        closeEditModal();
        loadContent();
      } catch (e) { alert('❌ ' + e.message); }
    }
    // Expiration helpers
    function toggleEditExpire() {
      const noExpire = document.getElementById('edit-no-expire').checked;
      document.getElementById('edit-expire-fields').style.display = noExpire ? 'none' : 'block';
    }
    function applyEditQuickExpire() {
      const days = parseInt(document.getElementById('edit-expire-quick').value);
      if (!days) return;
      const now = new Date();
      if (days === 1) now.setHours(now.getHours() + 24);
      else now.setDate(now.getDate() + days);
      document.getElementById('edit-expire-date').value = now.toISOString().split('T')[0];
      document.getElementById('edit-expire-time').value = now.toTimeString().slice(0, 5);
    }
    function getExpiresAt(prefix) {
      const noExpire = document.getElementById(prefix + '-no-expire').checked;
      if (noExpire) return null;
      const date = document.getElementById(prefix + '-expire-date').value;
      const time = document.getElementById(prefix + '-expire-time').value;
      if (!date) return null;
      return new Date(date + 'T' + (time || '23:59')).toISOString();
    }

    document.addEventListener('DOMContentLoaded', () => loadContent('all'));
  </script>
</head>
<body>
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>✏️ تعديل المحتوى</h3>
      <button class="btn btn-sm" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="edit-form">
        <div class="form-group">
          <label>العنوان</label>
          <input type="text" class="form-control" id="edit-title" required>
        </div>
        <div class="form-group">
          <label>المحتوى</label>
          <textarea class="form-control" id="edit-body" required></textarea>
        </div>
        <div class="form-group">
          <label>التصنيف</label>
          <select class="form-control" id="edit-category">
            <option value="الوطن">🇩🇿 الوطن</option>
            <option value="اقتصاد">💰 اقتصاد</option>
            <option value="رياضة">⚽ رياضة</option>
            <option value="العالم">🌍 العالم</option>
            <option value="مجتمع">👥 مجتمع</option>
            <option value="اسلاميات">🕌 اسلاميات</option>
            <option value="تكنولوجيا">💻 تكنولوجيا</option>
          </select>
        </div>
        <div class="form-group">
          <label>المصدر</label>
          <input type="text" class="form-control" id="edit-source">
        </div>
        <div class="form-group">
          <label>التاريخ</label>
          <input type="date" class="form-control" id="edit-date">
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="edit-no-expire" checked onchange="toggleEditExpire()">
            ☑ بدون تاريخ انتهاء
          </label>
        </div>
        <div id="edit-expire-fields" style="display:none;">
          <div class="form-group">
            <label>تاريخ انتهاء الظهور</label>
            <input type="date" class="form-control" id="edit-expire-date">
          </div>
          <div class="form-group">
            <label>وقت انتهاء الظهور</label>
            <input type="time" class="form-control" id="edit-expire-time" value="23:59">
          </div>
          <div class="form-group">
            <label>مدة جاهزة</label>
            <select class="form-control" id="edit-expire-quick" onchange="applyEditQuickExpire()">
              <option value="">-- اختر المدة --</option>
              <option value="1">24 ساعة</option>
              <option value="3">3 أيام</option>
              <option value="7">7 أيام</option>
              <option value="15">15 يوماً</option>
              <option value="30">30 يوماً</option>
              <option value="90">90 يوماً</option>
            </select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveEdit()">💾 حفظ التعديلات</button>
      <button class="btn" onclick="closeEditModal()">إلغاء</button>
    </div>
  </div>
</div>
</body>
</html>
