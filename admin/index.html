<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - الدخول | ثانوية المجاهد خليل محمد</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="admin-body">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
    <div style="background:white;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.15);padding:40px;max-width:400px;width:100%;">
      <div style="text-align:center;margin-bottom:30px;">
        <div style="font-size:3rem;margin-bottom:10px;">🔧</div>
        <h2 style="font-family:'Noto Kufi Arabic',sans-serif;color:#1a3a5c;">لوحة التحكم</h2>
        <p style="color:#888;font-size:0.9rem;">نظام الجريدة المدرسية الذكية</p>
        <div style="background:#f0f2f5;padding:6px 12px;border-radius:8px;font-size:0.8rem;color:#666;margin-top:10px;">
          Zoheir IT Solutions
        </div>
      </div>
      <div id="login-error" class="alert alert-danger" style="display:none;"></div>
      <form id="login-form">
        <div class="form-group">
          <label>اسم المستخدم</label>
          <input type="text" class="form-control" id="username" placeholder="أدخل اسم المستخدم" required>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" class="form-control" id="password" placeholder="أدخل كلمة المرور" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
          🚀 دخول
        </button>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('login-error');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      try {
        const res = await API.admin.login(username, password);
        if (res.success) {
          localStorage.setItem('admin_token', res.token);
          localStorage.setItem('admin_user', res.user);
          window.location.href = '/admin/dashboard.html';
        }
      } catch (e) {
        err.style.display = 'block';
        err.textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
      }
    });
  </script>
</body>
</html>
