<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الخبر الرئيسي | لوحة التحكم</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin-featured.css">
</head>
<body class="admin-body">
  <div class="admin-header">
    <h1>🔧 لوحة تحكم الصوت المحلي</h1>
    <div class="user-info">
      <span id="admin-user">المشرف</span>
      <a href="/" class="btn btn-sm btn-accent">🏠 الموقع</a>
      <button class="btn btn-sm btn-danger" onclick="logout()">🚪 خروج</button>
    </div>
  </div>
  <div class="admin-nav">
    <a href="/admin/dashboard.html">📊 لوحة القيادة</a>
    <a href="/admin/review.html">📝 مراجعة المحتوى</a>
    <a href="/admin/media.html">🖼 مكتبة الوسائط</a>
    <a href="/admin/featured.html" class="active">⭐ الخبر الرئيسي</a>
    <a href="/admin/logs.html">📋 سجل AI</a>
    <a href="/admin/settings.html">⚙️ الإعدادات</a>
  </div>
  <div class="admin-content">
    <h2 class="page-title"><i class="fas fa-star"></i> إدارة الخبر الرئيسي</h2>

    <div id="featured-stats" class="featured-stats"></div>

    <div class="featured-toolbar">
      <button class="btn btn-primary" onclick="openAddModal()">
        <i class="fas fa-plus"></i> إضافة خبر مميز
      </button>
      <div class="featured-search">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="بحث في العنوان..." oninput="onSearch()">
      </div>
      <select id="filter-status" class="form-control featured-filter" onchange="loadFeatured()">
        <option value="">الكل</option>
        <option value="true">نشط</option>
        <option value="false">غير نشط</option>
      </select>
    </div>

    <div id="featured-notification" style="display:none;" class="alert"></div>

    <div id="featured-list" class="featured-list"><div class="loading">جاري التحميل...</div></div>
  </div>

  <!-- Add Featured Modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3><i class="fas fa-plus"></i> إضافة خبر مميز</h3>
        <button class="btn btn-sm" onclick="closeModal('add-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>اختيار المقال</label>
          <div class="article-selector">
            <input type="text" id="article-search" class="form-control" placeholder="بحث في المقالات المنشورة..." oninput="onArticleSearch()">
            <div id="article-results" class="article-results"></div>
            <input type="hidden" id="selected-article-id">
            <div id="selected-article-info" class="selected-article-info" style="display:none;"></div>
          </div>
        </div>
        <div class="form-group">
          <label>الترتيب</label>
          <input type="number" class="form-control" id="add-order" min="1" value="1">
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="add-active" checked>
            نشط
          </label>
        </div>
        <div id="add-error" style="display:none;" class="alert alert-danger"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="submitAdd()"><i class="fas fa-save"></i> إضافة</button>
        <button class="btn" onclick="closeModal('add-modal')">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal" style="max-width:450px;">
      <div class="modal-header">
        <h3><i class="fas fa-edit"></i> تعديل الخبر المميز</h3>
        <button class="btn btn-sm" onclick="closeModal('edit-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>الترتيب</label>
          <input type="number" class="form-control" id="edit-order" min="1">
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="edit-active">
            نشط
          </label>
        </div>
        <div id="edit-error" style="display:none;" class="alert alert-danger"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="submitEdit()"><i class="fas fa-save"></i> حفظ</button>
        <button class="btn" onclick="closeModal('edit-modal')">إلغاء</button>
      </div>
    </div>
  </div>

  <script src="../../js/api.js"></script>
  <script src="../../js/admin-featured.js"></script>
</body>
</html>
