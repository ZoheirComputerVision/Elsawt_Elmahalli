<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأخبار العاجلة | لوحة التحكم</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin-breaking.css">
</head>
<body class="admin-body">
  <div class="admin-header">
    <h1>🔧 لوحة تحكم الصوت المحلي</h1>
    <div class="user-info">
      <span id="admin-user">المشرف</span>
      <a href="/" class="btn btn-sm btn-accent">🏠 الموقع</a>
      <button class="btn btn-sm btn-danger" onclick="logout()">🚪 خروج</button>
    </div>
  </div>
  <div class="admin-nav">
    <a href="/admin/dashboard.html">📊 لوحة القيادة</a>
    <a href="/admin/review.html">📝 مراجعة المحتوى</a>
    <a href="/admin/media.html">🖼 مكتبة الوسائط</a>
    <a href="/admin/featured.html">⭐ الخبر الرئيسي</a>
    <a href="/admin/breaking.html" class="active">📢 الأخبار العاجلة</a>
    <a href="/admin/logs.html">📋 سجل AI</a>
    <a href="/admin/settings.html">⚙️ الإعدادات</a>
  </div>
  <div class="admin-content">
    <h2 class="page-title"><i class="fas fa-bolt"></i> إدارة الأخبار العاجلة</h2>

    <div id="breaking-stats" class="breaking-stats"></div>

    <div class="breaking-toolbar">
      <button class="btn btn-danger" onclick="openAddModal()">
        <i class="fas fa-plus"></i> إضافة خبر عاجل
      </button>
      <button class="btn btn-accent" onclick="archiveExpired()">
        <i class="fas fa-archive"></i> أرشفة المنتهية
      </button>
      <div class="breaking-search">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="بحث في العنوان..." oninput="onSearch()">
      </div>
      <select id="filter-status" class="form-control breaking-filter" onchange="loadBreaking()">
        <option value="">الكل</option>
        <option value="true">نشط</option>
        <option value="false">غير نشط</option>
      </select>
    </div>

    <div id="breaking-notification" style="display:none;" class="alert"></div>

    <div id="breaking-list" class="breaking-list"><div class="loading">جاري التحميل...</div></div>
  </div>

  <!-- Add Breaking Modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal" style="max-width:550px;">
      <div class="modal-header">
        <h3><i class="fas fa-plus"></i> إضافة خبر عاجل</h3>
        <button class="btn btn-sm" onclick="closeModal('add-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>العنوان <span class="required">*</span></label>
          <input type="text" class="form-control" id="add-title" placeholder="نص الخبر العاجل">
        </div>
        <div class="form-group">
          <label>رابط (اختياري)</label>
          <input type="url" class="form-control" id="add-url" placeholder="https://...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>تاريخ البدء</label>
            <input type="datetime-local" class="form-control" id="add-starts">
          </div>
          <div class="form-group">
            <label>تاريخ الانتهاء</label>
            <input type="datetime-local" class="form-control" id="add-expires">
          </div>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="add-active" checked>
            نشط
          </label>
        </div>
        <div id="add-error" style="display:none;" class="alert alert-danger"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="submitAdd()"><i class="fas fa-save"></i> إضافة</button>
        <button class="btn" onclick="closeModal('add-modal')">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal" style="max-width:550px;">
      <div class="modal-header">
        <h3><i class="fas fa-edit"></i> تعديل الخبر العاجل</h3>
        <button class="btn btn-sm" onclick="closeModal('edit-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>العنوان <span class="required">*</span></label>
          <input type="text" class="form-control" id="edit-title">
        </div>
        <div class="form-group">
          <label>رابط (اختياري)</label>
          <input type="url" class="form-control" id="edit-url" placeholder="https://...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>تاريخ البدء</label>
            <input type="datetime-local" class="form-control" id="edit-starts">
          </div>
          <div class="form-group">
            <label>تاريخ الانتهاء</label>
            <input type="datetime-local" class="form-control" id="edit-expires">
          </div>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="edit-active">
            نشط
          </label>
        </div>
        <div id="edit-error" style="display:none;" class="alert alert-danger"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="submitEdit()"><i class="fas fa-save"></i> حفظ</button>
        <button class="btn" onclick="closeModal('edit-modal')">إلغاء</button>
      </div>
    </div>
  </div>

  <script src="../../js/api.js"></script>
  <script src="../../js/admin-breaking.js"></script>
</body>
</html>
